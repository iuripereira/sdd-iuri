# deps.toml — mapa de dependências documentais deste repositório (skill: guarding-doc-integrity)
# Um assunto tem um arquivo DONO; valor concreto só existe no dono + espelhos
# sancionados; todo o resto do repo LINKA para o dono.
# Validado por validate_integrity.py no job `ci` e antes de todo commit que toque .md.

# C2 (materialização fora dos sancionados) e C3 (links) varrem estes arquivos.
# As deltas abertas (specs/NNN-*/) ficam fora: valor proposto só é governado
# quando o archive o consolida no TRUTH.md.
scan_globs = ["*.md", "docs/**/*.md", "specs/TRUTH.md", "specs/truth/*.md", "skills/**/*.md"]

# Onde citar valores é legítimo: changelog, diário de bordo (STATE.md), registro
# de débito (o DEBT.md cita valores ao descrever débitos e gatilhos), ADRs
# (imutáveis após Accepted) e deltas arquivadas. Globs terminam em *.md, não em
# '**': pathlib em Python <= 3.12 casa só diretórios num '**' final e o exclude
# viraria no-op.
exclude_globs = ["CHANGELOG.md", "STATE.md", "DEBT.md", "docs/adrs/**/*.md", "**/_archive/**/*.md"]

# ── Limiar de particionamento do TRUTH.md ─────────────────────────────────────
# Dono: RNF1 do TRUTH.md. Espelhos: a constante que aplica o limiar
# (TRUTH_LIMITE em check_cycle.py) e os docs do ciclo que o citam. O espelho
# .py não entra na varredura do C2 (só .md), mas o C1 o mantém em sincronia.
[[owner]]
file = "specs/TRUTH.md"
mirrors = [
  "skills/spec-feature/scripts/check_cycle.py",
  "skills/spec-feature/references/cycle.md",
  "skills/spec-feature/references/templates/TRUTH.md",
]

  [[owner.value]]
  name = "truth-limiar-particionamento"
  pattern = '\b800\b'

# ── Limiar de tamanho de PR ───────────────────────────────────────────────────
# Dono: a regra canônica do módulo git-workflow. Único espelho que materializa o
# valor concreto é o CLAUDE.md (regras canônicas do próprio repo); SKILL.md,
# detection.md e analyze.md passaram a citar "o limiar canônico" sem repetir o
# número (DT-002 quitado).
[[owner]]
file = "skills/projeto-init/references/canonical-rules.md"
mirrors = ["CLAUDE.md"]

  [[owner.value]]
  name = "pr-limiar-tamanho"
  pattern = '\b500\b'

# ── Cabeçalho-resumo do plan.md ───────────────────────────────────────────────
# Dono: RNF1 do TRUTH.md. Valor citado no gatilho do template resumo-plan.md e no
# contrato da fase plan (cycle.md). Padrão ancorado em "linhas" — o "800 linhas"
# vizinho no RNF1 não colide (DT-008).
[[owner]]
file = "specs/TRUTH.md"
mirrors = [
  "skills/spec-feature/references/templates/resumo-plan.md",
  "skills/spec-feature/references/cycle.md",
]

  [[owner.value]]
  name = "resumo-plan-limiar-linhas"
  pattern = '15 linhas'

# ── Limiar de particionamento por domínios do TRUTH.md ────────────────────────
# Dono: comentário de particionamento do TRUTH.md (par do limiar de 800 linhas,
# que tem bloco próprio acima). Espelhado no ciclo e no template do TRUTH.md.
# Padrão ancorado em "dom" para não colidir com outros "10" (DT-008).
[[owner]]
file = "specs/TRUTH.md"
mirrors = [
  "skills/spec-feature/references/cycle.md",
  "skills/spec-feature/references/templates/TRUTH.md",
]

  [[owner.value]]
  name = "truth-limiar-dominios"
  pattern = '10 dom'
