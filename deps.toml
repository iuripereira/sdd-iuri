# deps.toml — mapa de dependências documentais deste repositório (skill: guarding-doc-integrity)
# Um assunto tem um arquivo DONO; valor concreto só existe no dono + espelhos
# sancionados; todo o resto do repo LINKA para o dono.
# Validado por validate_integrity.py no job `ci` e antes de todo commit que toque .md.

# C2 (materialização fora dos sancionados) e C3 (links) varrem estes arquivos.
# As deltas abertas (specs/NNN-*/) ficam fora: valor proposto só é governado
# quando o archive o consolida no TRUTH.md.
scan_globs = ["*.md", "docs/**/*.md", "specs/TRUTH.md", "specs/truth/*.md", "skills/**/*.md"]

# Onde citar valores é legítimo: changelog, handoff vivo (o STATE.md cita
# valores ao registrar decisões abertas), ADRs (imutáveis após Accepted) e
# deltas arquivadas. Globs terminam em *.md, não em '**': pathlib em
# Python <= 3.12 casa só diretórios num '**' final e o exclude viraria no-op.
exclude_globs = ["CHANGELOG.md", "STATE.md", "docs/adrs/**/*.md", "**/_archive/**/*.md"]

# ── Limiar de particionamento do TRUTH.md ─────────────────────────────────────
# Dono: RNF1 do TRUTH.md. Espelhos: a constante que aplica o limiar
# (TRUTH_LIMITE em check_cycle.py) e os docs do ciclo que o citam. O espelho
# .py não entra na varredura do C2 (só .md), mas o C1 o mantém em sincronia.
[[owner]]
file = "specs/TRUTH.md"
mirrors = [
  "skills/spec-feature/scripts/check_cycle.py",
  "skills/spec-feature/references/cycle.md",
  "skills/spec-feature/references/templates/TRUTH.md",
]

  [[owner.value]]
  name = "truth-limiar-particionamento"
  pattern = '\b800\b'

# ── Limiar de tamanho de PR ───────────────────────────────────────────────────
# Dono: a regra canônica do módulo git-workflow. 4 espelhos excede o teto de
# 2–3 da skill — sancionados como baseline consciente do estado atual; a
# decisão aberta sobre este limiar (STATE.md, "Decisões em aberto") é a hora
# de enxugar os espelhos via delta, junto com o valor.
[[owner]]
file = "skills/projeto-init/references/canonical-rules.md"
mirrors = [
  "CLAUDE.md",
  "skills/projeto-init/SKILL.md",
  "skills/projeto-init/references/detection.md",
  "skills/spec-feature/references/analyze.md",
]

  [[owner.value]]
  name = "pr-limiar-tamanho"
  pattern = '\b500\b'
