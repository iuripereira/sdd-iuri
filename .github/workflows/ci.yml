# CI do plugin sdd-iuri: valida JSON, TOML, YAML, frontmatter das SKILL.md,
# portabilidade (RNF1) e os --selftest dos gates.
# O nome do job ("ci") é o contexto exigido pelo ruleset sdd-protect-main — não renomeie.
name: CI
on:
  pull_request:
  push:
    branches: [main]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Validar JSON
        run: |
          set -e
          for f in $(git ls-files '*.json'); do
            python3 -m json.tool "$f" > /dev/null || { echo "JSON inválido: $f"; exit 1; }
          done
      - name: Validar TOML
        run: |
          set -e
          for f in $(git ls-files '*.toml'); do
            python3 -c "import tomllib,sys; tomllib.load(open(sys.argv[1],'rb'))" "$f" \
              || { echo "TOML inválido: $f"; exit 1; }
          done
      - name: Validar YAML
        run: |
          python3 - <<'EOF'
          import sys, subprocess, yaml
          files = subprocess.check_output(['git', 'ls-files', '*.yml', '*.yaml'], text=True).split()
          bad = []
          for f in files:
              try:
                  yaml.safe_load(open(f))
              except Exception as e:
                  bad.append(f"{f}: {e}")
          if bad:
              print("\n".join(bad)); sys.exit(1)
          EOF
      - name: Portabilidade (RNF1) — zero caminho absoluto de maquina
        run: |
          # padrao com [.] para nao casar com esta propria linha do workflow
          if grep -rnE '~/[.]claude/skills' skills/ .github/; then
            echo "RNF1: caminho absoluto de maquina encontrado acima"; exit 1
          fi
          echo "RNF1: OK"
      - name: Selftest dos gates
        run: |
          set -e
          python3 skills/spec-feature/scripts/check_cycle.py --selftest
          python3 skills/guarding-doc-integrity/scripts/validate_integrity.py --selftest
      - name: Validar frontmatter dos SKILL.md
        run: |
          set -e
          shopt -s nullglob
          arquivos=(skills/*/SKILL.md)
          # glob que nao casa era a falha silenciosa: bash passava o literal adiante
          [ ${#arquivos[@]} -gt 0 ] || { echo "nenhuma SKILL.md em skills/"; exit 1; }
          for f in "${arquivos[@]}"; do
            head -1 "$f" | grep -q '^---$' && grep -q '^name:' "$f" && grep -q '^description:' "$f" \
              || { echo "frontmatter inválido: $f"; exit 1; }
          done
          echo "frontmatter OK em ${#arquivos[@]} skills"
